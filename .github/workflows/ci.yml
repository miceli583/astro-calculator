name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck lint test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Cache the Swiss Ephemeris data files the postinstall downloader fetches
      # (~5MB). Keyed on the downloader script so a new file list busts the
      # cache automatically.
      - name: Cache ephemeris files
        uses: actions/cache@v4
        with:
          path: ephemeris
          key: ephemeris-${{ hashFiles('scripts/download-ephemeris.mjs') }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Test
        run: npm test
